<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Medicamentos | ML</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html">MediControl AI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Alternar navegación" title="Alternar navegación">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="./index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./medicamentos.html">Medicamentos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./movimientos.html">Movimientos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-warning fw-bold" href="./predicciones.html">Predicción ML</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 text-secondary">Resumen de Inventario (KPIs)</h2>
        <div class="row">
            
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-primary shadow-sm h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Total de Medicamentos</h5>
                        <h1 class="display-3 fw-bold" id="txtTotalMedicamentos">...</h1>
                        <p class="card-text">Catálogo activo en sistema</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card text-white bg-danger shadow-sm h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Stock Crítico</h5>
                        <h1 class="display-3 fw-bold" id="txtStockCritico">...</h1>
                        <p class="card-text">Lotes por debajo del mínimo</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-3">
                <div class="card text-dark bg-warning shadow-sm h-100">
                    <div class="card-body text-center">
                        <h5 class="card-title">Próximos a Vencer</h5>
                        <h1 class="display-3 fw-bold" id="txtProximosVencer">...</h1>
                        <p class="card-text">Vencimientos en < 30 días</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../js/app.js"></script>
</body>
</html>

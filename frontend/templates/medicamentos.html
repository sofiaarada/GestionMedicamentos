<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicamentos | MediControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="./index.html">MediControl AI</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="./index.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="./medicamentos.html">Medicamentos</a></li>
                    <li class="nav-item"><a class="nav-link" href="./movimientos.html">Movimientos</a></li>
                    <li class="nav-item"><a class="nav-link text-warning fw-bold" href="./predicciones.html">Predicción ML</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Registro de Medicamentos</h2>
        <div class="card shadow-sm p-4 mt-3">
            <form id="formMedicamento">
                <div class="mb-3">
                    <label for="nombreInput" class="form-label">Nombre del Medicamento</label>
                    <input type="text" class="form-control" id="nombreInput" placeholder="Ingrese el nombre del medicamento" required>
                </div>
                <div class="mb-3">
                    <label for="unidadInput" class="form-label">Unidad de Medida (Ej. Tabletas, Jarabe)</label>
                    <input type="text" class="form-control" id="unidadInput" placeholder="Ingrese la unidad de medida" required>
                </div>
                <div class="mb-3">
                    <label for="categoriaInput" class="form-label">ID Categoría</label>
                    <input type="number" class="form-control" id="categoriaInput" placeholder="Ingrese el ID de categoría" required>
                </div>
                <button type="submit" class="btn btn-primary">Guardar Medicamento</button>
            </form>
        </div>
    </div>
    <script src="../js/app.js"></script>
</body>
</html>
